user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    client_max_body_size 10M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/font-woff2;
    gzip_min_length 1024;

    server {
        listen 80;
        server_name k14b105.p.ssafy.io;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name k14b105.p.ssafy.io;

        ssl_certificate     /etc/letsencrypt/live/k14b105.p.ssafy.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/k14b105.p.ssafy.io/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        client_max_body_size 10M;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # 외부에서 내부 API 직접 호출 차단 (/api/v1/internal/ 경로는 FastAPI 콜백 전용)
        location ~ ^/api/v[0-9]+/internal/ {
            deny all;
            return 403;
        }

        # SSE: 스캔 상태 스트림 (버퍼링 비활성화 필수)
        location ~ ^/api/v[0-9]+/scans/[^/]+/status$ {
            proxy_pass          http://spring:8080;
            proxy_http_version  1.1;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    Connection        "";

            proxy_buffering     off;
            proxy_cache         off;
            proxy_read_timeout  3600s;
            chunked_transfer_encoding on;

            add_header Cache-Control "no-cache" always;
            add_header X-Accel-Buffering "no" always;
        }

        # Spring Boot API
        location /api/ {
            proxy_pass         http://spring:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # n8n (WebSocket 지원)
        location /n8n/ {
            proxy_pass         http://n8n:5678/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_set_header   X-Forwarded-Prefix /n8n;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 86400s;
        }

        # n8n editor API may request absolute root paths even when the UI is served under /n8n/.
        location ~ ^/(rest|webhook|webhook-test|form|form-test|wait)(/.*)?$ {
            proxy_pass         http://n8n:5678;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_set_header   X-Forwarded-Prefix /n8n;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 86400s;
        }

        # React SPA
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }
    }
}
