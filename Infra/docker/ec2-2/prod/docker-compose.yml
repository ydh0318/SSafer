# EC2 #2 prod: 분석 서버 (private IP만 사용, 외부 직접 접근 불가)
# EC2 #1 Spring이 http://{EC2_2_PUBLIC_IP}:8000 으로 분석 요청
# FastAPI가 http://${EC2_1_PRIVATE_IP}:8080/api/v1/internal/callback 으로 결과 콜백
# NOTE: 변수명은 EC2_1_PRIVATE_IP지만, 계정/VPC 분리 환경에서는 EC2 #1 public IP를 넣는다.
#
# UFW 설정 (1회):
#   sudo ufw allow 22/tcp
#   sudo ufw allow from <EC2_1_PUBLIC_IP> to any port 8000 proto tcp
#   sudo ufw enable

name: ssafer-ec2-prod

services:
  fastapi:
    image: ${FASTAPI_IMAGE}
    container_name: ssafer-fastapi
    restart: always
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      OLLAMA_TEMPERATURE: ${OLLAMA_TEMPERATURE:-0.1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SPRING_CALLBACK_URL: http://${EC2_1_PRIVATE_IP}:8080/api/v1/internal/callback
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      APP_SCAN_RAW_S3_BUCKET: ${APP_SCAN_RAW_S3_BUCKET}
      APP_ANALYSIS_RESULT_S3_BUCKET: ${APP_ANALYSIS_RESULT_S3_BUCKET}
      HASDATA_API_KEY: ${HASDATA_API_KEY}
    ports:
      - "8000:8000"
    networks:
      - ec2-internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

networks:
  ec2-internal:
    driver: bridge
