# EC2 #2 prod: AI 분석 서버
# EC2 #1/#2는 서로 다른 AWS 계정/VPC → public IP로 통신
# - EC2 #1 Spring -> EC2 #2 FastAPI: http://<EC2_2_PUBLIC_IP>:8000
# - EC2 #2 Worker -> EC2 #1 RabbitMQ: <EC2_1_PUBLIC_IP>:8989
# - EC2 #2 Worker -> EC2 #1 Spring callback: http://<EC2_1_PUBLIC_IP>:8080
#
# UFW 설정 (1회):
#   sudo ufw allow 22/tcp
#   sudo ufw allow from <EC2_1_PUBLIC_IP> to any port 8000 proto tcp
#   sudo ufw enable

name: ${COMPOSE_PROJECT_NAME:-ssafer-ec2-prod}

services:
  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    container_name: ${OLLAMA_CONTAINER_NAME:-ssafer-ollama}
    restart: ${RESTART_POLICY:-always}
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - ec2-internal
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  fastapi:
    image: ${FASTAPI_IMAGE}
    container_name: ${FASTAPI_CONTAINER_NAME:-ssafer-fastapi}
    restart: ${RESTART_POLICY:-always}
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      OLLAMA_TEMPERATURE: ${OLLAMA_TEMPERATURE:-0.1}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-600}
      OLLAMA_MAX_RETRIES: ${OLLAMA_MAX_RETRIES:-2}
      OLLAMA_RETRY_BACKOFF_SECONDS: ${OLLAMA_RETRY_BACKOFF_SECONDS:-1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-haiku-latest}
      ANTHROPIC_TEMPERATURE: ${ANTHROPIC_TEMPERATURE:-0.1}
      ANTHROPIC_TIMEOUT_SECONDS: ${ANTHROPIC_TIMEOUT_SECONDS:-600}
      GMS_API_KEY: ${GMS_API_KEY}
      GMS_BASE_URL: ${GMS_BASE_URL:-https://gms.ssafy.io/gmsapi/api.anthropic.com}
      GMS_MODEL: ${GMS_MODEL:-claude-haiku-4-5-20251001}
      GMS_TEMPERATURE: ${GMS_TEMPERATURE:-0.1}
      GMS_TIMEOUT_SECONDS: ${GMS_TIMEOUT_SECONDS:-600}
      GMS_FORCE_JSON_RESPONSE_FORMAT: ${GMS_FORCE_JSON_RESPONSE_FORMAT:-false}
      HASDATA_API_KEY: ${HASDATA_API_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      APP_SCAN_RESULT_S3_BUCKET: ${APP_SCAN_RESULT_S3_BUCKET}
      APP_ANALYSIS_RESULT_S3_BUCKET: ${APP_ANALYSIS_RESULT_S3_BUCKET}
    ports:
      - "${FASTAPI_HOST_BIND_IP:-0.0.0.0}:${FASTAPI_HOST_PORT:-8000}:8000"
    networks:
      - ec2-internal
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
  
  worker:
    image: ${FASTAPI_IMAGE}
    container_name: ${WORKER_CONTAINER_NAME:-ssafer-ai-worker}
    restart: ${RESTART_POLICY:-always}
    command: ["python", "-m", "app.worker.consumer"]
    environment:
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_VIRTUAL_HOST: ${RABBITMQ_VIRTUAL_HOST:-/}
      AGENT_TASK_SCAN_REQUEST_QUEUE: ${AGENT_TASK_SCAN_REQUEST_QUEUE:-ssafer.agent.scan.request}
      FASTAPI_BASE_URL: ${FASTAPI_BASE_URL:-http://fastapi:8000}
      SPRING_BASE_URL: ${SPRING_BASE_URL}
      SPRING_API_SECRET: ${SPRING_API_SECRET}
      APP_ANALYSIS_RESULT_S3_BUCKET: ${APP_ANALYSIS_RESULT_S3_BUCKET}
      WORKER_HTTP_TIMEOUT_SECONDS: ${WORKER_HTTP_TIMEOUT_SECONDS:-600}
    networks:
      - ec2-internal
    depends_on:
      fastapi:
        condition: service_healthy

volumes:
  ollama-data:
    name: ${OLLAMA_VOLUME_NAME:-ssafer-ollama-data}

networks:
  ec2-internal:
    name: ${EC2_INTERNAL_NETWORK_NAME:-ssafer-ec2-prod-internal}
    driver: bridge
