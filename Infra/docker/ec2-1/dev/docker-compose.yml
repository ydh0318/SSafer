# EC2 #1 dev: 서비스 서버 (로컬 개발 환경)
# 사전 준비: docker network create ssafer-dev
# 실행 순서: ec2-2/dev 먼저 기동 후 이 파일 실행
# 실행: docker compose --env-file .env up -d

name: ssafer-ec1-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: ssafer-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ssafer}
      POSTGRES_USER: ${POSTGRES_USER:-ssafer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_DB_NAME: ${N8N_DB_NAME:-n8n}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../prod/initdb:/docker-entrypoint-initdb.d:ro
    networks:
      - ec1-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ssafer} -d ${POSTGRES_DB:-ssafer}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7.4-alpine
    container_name: ssafer-redis-dev
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - ec1-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ssafer-rabbitmq-dev
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    networks:
      - ec1-internal
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  engine:
    build:
      context: ../../../../
      dockerfile: Infra/docker/dockerfiles/Dockerfile.engine
    container_name: ssafer-engine-dev
    restart: unless-stopped
    environment:
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      SCAN_MAX_FILE_COUNT: ${SCAN_MAX_FILE_COUNT:-20}
      SCAN_MAX_UPLOAD_BYTES: ${SCAN_MAX_UPLOAD_BYTES:-10485760}
    ports:
      - "8100:8100"
    networks:
      - ec1-internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  spring:
    build:
      context: ../../../../
      dockerfile: Infra/docker/dockerfiles/Dockerfile.spring
    container_name: ssafer-spring-dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ssafer}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-ssafer}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_OUT_OF_ORDER: "true"
      ANALYSIS_SERVER_URL: http://fastapi:8000
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      APP_SCAN_ENGINE_URL: http://engine:8100
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER:-ssafer}
      JWT_ACCESS_TOKEN_EXPIRES_SECONDS: ${JWT_ACCESS_TOKEN_EXPIRES_SECONDS:-7200}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      APP_SCAN_RAW_S3_BUCKET: ${APP_SCAN_RAW_S3_BUCKET}
      APP_SCAN_RAW_S3_REGION: ${APP_SCAN_RAW_S3_REGION:-ap-northeast-2}
      SPRING_PROFILES_ACTIVE: local
    ports:
      - "8080:8080"
    networks:
      - ec1-internal
      - ssafer-dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  n8n:
    image: n8nio/n8n:latest
    container_name: ssafer-n8n-dev
    restart: unless-stopped
    environment:
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_HOST: localhost
      WEBHOOK_URL: http://localhost:5678/
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-ssafer}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      EXECUTIONS_DATA_SAVE_ON_ERROR: all
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: all
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - ec1-internal
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  n8n-data:

networks:
  ec1-internal:
    driver: bridge
  ssafer-dev:
    external: true
