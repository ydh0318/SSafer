# EC2 #1 prod: 서비스 서버 (ssafer.co.kr)
# 실행: docker compose --env-file .env pull && docker compose --env-file .env up -d
#
# EC2 #1/#2는 서로 다른 AWS 계정/VPC → public IP로 통신
# Spring 8080, RabbitMQ 8989(→5672) 포트는 호스트 전체 바인딩
# → UFW에서 EC2 #2 public IP만 허용으로 보호
#
# UFW 설정 (1회):
#   sudo ufw allow 22/tcp
#   sudo ufw allow 80/tcp
#   sudo ufw allow 443/tcp
#   sudo ufw allow 9090/tcp
#   sudo ufw allow from <EC2_2_PUBLIC_IP> to any port 8080 proto tcp
#   sudo ufw allow from <EC2_2_PUBLIC_IP> to any port 8989 proto tcp
#   sudo ufw enable

name: ssafer-ec1-prod

services:
  postgres:
    image: postgres:16-alpine
    container_name: ssafer-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_DB_NAME: ${N8N_DB_NAME:-n8n}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    networks:
      - ec1-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7.4-alpine
    container_name: ssafer-redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - ec1-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ssafer-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "8989:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    networks:
      - ec1-internal
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  engine:
    image: ${ENGINE_IMAGE}
    container_name: ssafer-engine
    restart: always
    environment:
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      SCAN_MAX_FILE_COUNT: ${SCAN_MAX_FILE_COUNT:-20}
      SCAN_MAX_UPLOAD_BYTES: ${SCAN_MAX_UPLOAD_BYTES:-10485760}
    networks:
      - ec1-internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  spring:
    image: ${SPRING_IMAGE}
    container_name: ssafer-spring
    restart: always
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_OUT_OF_ORDER: "true"
      ANALYSIS_SERVER_URL: http://${EC2_2_PRIVATE_IP}:8000
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      APP_SCAN_ENGINE_URL: http://engine:8100
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER:-ssafer}
      JWT_ACCESS_TOKEN_EXPIRES_SECONDS: ${JWT_ACCESS_TOKEN_EXPIRES_SECONDS:-7200}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      APP_SCAN_RAW_S3_BUCKET: ${APP_SCAN_RAW_S3_BUCKET}
      APP_SCAN_RAW_S3_REGION: ${APP_SCAN_RAW_S3_REGION:-ap-northeast-2}
      SPRING_PROFILES_ACTIVE: prod
    # EC2 #2 콜백을 위해 호스트 전체 바인딩 (UFW로 접근 제어)
    ports:
      - "8080:8080"
    networks:
      - ec1-internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  n8n:
    image: n8nio/n8n:latest
    container_name: ssafer-n8n
    restart: always
    environment:
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      N8N_HOST: k14b105.p.ssafy.io
      N8N_PATH: /n8n/
      WEBHOOK_URL: https://k14b105.p.ssafy.io/n8n/
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-https://k14b105.p.ssafy.io/n8n/}
      N8N_PROXY_HOPS: 1
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Asia/Seoul}
      TZ: ${TZ:-Asia/Seoul}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      EXECUTIONS_DATA_SAVE_ON_ERROR: all
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: all
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - ec1-internal
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: ${NGINX_IMAGE}
    container_name: ssafer-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # certbot으로 발급한 Let's Encrypt 인증서 (읽기 전용 마운트)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - ec1-internal
    depends_on:
      spring:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  n8n-data:

networks:
  ec1-internal:
    driver: bridge
