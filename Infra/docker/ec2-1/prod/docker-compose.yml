# EC2 #1 prod: 서비스 서버 (k14b105.p.ssafy.io)
# 실행: docker compose --env-file .env pull && docker compose --env-file .env up -d
#
# Spring 8080 포트는 호스트 전체에 바인딩 (127.0.0.1 아님)
# → EC2 #2 FastAPI가 private IP:8080으로 콜백 필요
# → UFW에서 EC2_2_PRIVATE_IP만 8080/tcp 허용으로 보호
#
# UFW 설정 (1회):
#   sudo ufw allow 22/tcp
#   sudo ufw allow 80/tcp
#   sudo ufw allow 443/tcp
#   sudo ufw allow 9090/tcp
#   sudo ufw allow from <EC2_2_PRIVATE_IP> to any port 8080 proto tcp
#   sudo ufw enable

name: ssafer-ec1-prod

services:
  postgres:
    image: postgres:16-alpine
    container_name: ssafer-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_DB_NAME: ${N8N_DB_NAME:-n8n}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    networks:
      - ec1-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7.4-alpine
    container_name: ssafer-redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - ec1-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  spring:
    image: ${SPRING_IMAGE}
    container_name: ssafer-spring
    restart: always
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_OUT_OF_ORDER: "true"
      ANALYSIS_SERVER_URL: http://${EC2_2_PRIVATE_IP}:8000
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER:-ssafer}
      JWT_ACCESS_TOKEN_EXPIRES_SECONDS: ${JWT_ACCESS_TOKEN_EXPIRES_SECONDS:-7200}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      SPRING_PROFILES_ACTIVE: prod
    # EC2 #2 콜백을 위해 호스트 전체 바인딩 (UFW로 접근 제어)
    ports:
      - "8080:8080"
    networks:
      - ec1-internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  n8n:
    image: n8nio/n8n:latest
    container_name: ssafer-n8n
    restart: always
    environment:
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      N8N_HOST: k14b105.p.ssafy.io
      N8N_PATH: /n8n/
      WEBHOOK_URL: https://k14b105.p.ssafy.io/n8n/
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-https://k14b105.p.ssafy.io/n8n/}
      N8N_PROXY_HOPS: 1
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      EXECUTIONS_DATA_SAVE_ON_ERROR: all
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: all
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - ec1-internal
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: ${NGINX_IMAGE}
    container_name: ssafer-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # certbot으로 발급한 Let's Encrypt 인증서 (읽기 전용 마운트)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - ec1-internal
    depends_on:
      spring:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  n8n-data:

networks:
  ec1-internal:
    driver: bridge
