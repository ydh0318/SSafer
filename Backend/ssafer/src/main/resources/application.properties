spring.application.name=ssafer

# ??? ??? ? ?? ?? ??????? ????? ??
spring.flyway.out-of-order=true

spring.config.import=optional:file:.env[.properties]

# JWT
JWT_ISSUER=ssafer
JWT_ACCESS_TOKEN_EXPIRES_SECONDS=900
JWT_REFRESH_TOKEN_EXPIRES_SECONDS=1209600

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# WS /ws/v1/internal/agents/connect 인증용 단일 Bearer 토큰
agent.auth.token=${AGENT_AUTH_TOKEN:}
# 내부 Agent API(/api/v1/internal/agents/**) 인증용 agentId:token 매핑
agent.auth.tokens=${AGENT_AUTH_TOKENS:}
# Agent heartbeat 설정값(초)
agent.heartbeat.ping-interval-seconds=${AGENT_HEARTBEAT_PING_INTERVAL_SECONDS:30}
agent.heartbeat.timeout-seconds=${AGENT_HEARTBEAT_TIMEOUT_SECONDS:90}
