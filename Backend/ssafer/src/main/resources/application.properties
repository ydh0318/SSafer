spring.application.name=ssafer

# Allow out-of-order flyway migration during development.
spring.flyway.out-of-order=true

spring.config.import=optional:file:.env[.properties]

# JWT
JWT_ISSUER=ssafer
JWT_ACCESS_TOKEN_EXPIRES_SECONDS=900
JWT_REFRESH_TOKEN_EXPIRES_SECONDS=1209600

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Google OAuth
oauth.google.client-id=${GOOGLE_OAUTH_CLIENT_ID:}
oauth.google.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET:}
oauth.google.token-uri=${GOOGLE_OAUTH_TOKEN_URI:https://oauth2.googleapis.com/token}
oauth.google.user-info-uri=${GOOGLE_OAUTH_USER_INFO_URI:https://openidconnect.googleapis.com/v1/userinfo}

# Agent heartbeat settings (seconds)
agent.heartbeat.ping-interval-seconds=${AGENT_HEARTBEAT_PING_INTERVAL_SECONDS:30}
agent.heartbeat.timeout-seconds=${AGENT_HEARTBEAT_TIMEOUT_SECONDS:90}

# Agent task queue settings
agent.task.queue.exchange=${AGENT_TASK_QUEUE_EXCHANGE:ssafer.agent.tasks}
agent.task.queue.scan-request-queue=${AGENT_TASK_SCAN_REQUEST_QUEUE:ssafer.agent.scan.request}
agent.task.queue.scan-request-routing-key=${AGENT_TASK_SCAN_REQUEST_ROUTING_KEY:agent.scan.request}
